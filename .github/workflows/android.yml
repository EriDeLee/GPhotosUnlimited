name: Android CI

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths-ignore: '**.md'
  pull_request:
    branches: [main]
    paths-ignore: '**.md'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Check out
        uses: actions/checkout@v6
        with:
          submodules: 'recursive'
          fetch-depth: 1

      - name: Set up JDK
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: 21

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v5

      - name: Build with Gradle
        run: |
          chmod +x gradlew
          ./gradlew assembleRelease \
            --no-daemon \
            --parallel \
            -Dorg.gradle.jvmargs="-Xmx4096m -XX:+UseParallelGC"

      - name: Upload CI module zip as artifact
        uses: actions/upload-artifact@v7
        with:
          name: 'GPhotosUnlimited-CI_#${{ github.run_number }}'
          path: 'module/*'
          compression-level: 9
          retention-days: 1